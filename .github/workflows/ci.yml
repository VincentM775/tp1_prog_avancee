name: CI - MasterAnnonce

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

jobs:

  # ============================================================
  # Job 1 : Build, Tests & Packaging (matrice Java 17 + 21)
  # ============================================================
  build:
    name: Build & Test (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [ 17, 21 ]

    steps:
      # Étape A — Checkout
      - name: Checkout du code source
        uses: actions/checkout@v4

      # Étape B — Setup Java + cache Maven
      - name: Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      # Étape C — Build & Tests (unitaires + intégration)
      - name: Build & Tests (mvn clean verify)
        run: mvn -B clean verify

      # Étape D — Upload du JAR en artifact (uniquement Java 17)
      - name: Upload JAR artifact
        if: matrix.java-version == 17
        uses: actions/upload-artifact@v4
        with:
          name: master-annonce-jar
          path: target/*.jar
          retention-days: 7

      # Bonus 3 — Upload du rapport JaCoCo (uniquement Java 17)
      - name: Upload rapport JaCoCo
        if: matrix.java-version == 17
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  # ============================================================
  # Job 2 : Build Docker (uniquement sur main)
  # ============================================================
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t masterannonce:latest .

      - name: Vérification de l'image
        run: docker images masterannonce
